site_name: mushin
site_url: https://martinez-hub.github.io/mushin/
site_description: Boilerplate-free, reproducible ML experiment workflows on PyTorch Lightning and hydra-zen.
repo_url: https://github.com/martinez-hub/mushin
repo_name: martinez-hub/mushin

# Internal design docs live under docs/superpowers/ — never publish them.
exclude_docs: |
  superpowers/

theme:
  name: material
  logo: assets/mushin-light.png
  favicon: assets/mushin-light.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle: { icon: material/weather-night, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle: { icon: material/weather-sunny, name: Switch to light mode }
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight: { anchor_linenums: true }
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - toc: { permalink: true }

nav:
  - Home: index.md
  - Install: install.md
  - Quickstart: quickstart.md
  - Tutorial: tutorial.md
  - Core concepts: concepts.md
  - Guides:
      - Workflows & sweeps: guides/workflows.md
      - Auto-tuning batch & LR: guides/auto-tuning.md
      - Comparing methods: guides/compare.md
      - Built-in batteries: guides/batteries.md
      - LLM evaluation: guides/llm.md
      - Studies: guides/study.md
      - Resilient & resumable sweeps: guides/resilience.md
      - From exploration to a paper: guides/exploration-to-paper.md
      - Packing small jobs onto GPUs: guides/packing.md
      - Multi-node training: guides/multinode.md
      - Sharded training: guides/sharding.md
      - Segmentation: guides/segmentation.md
      - Custom metrics & predict_fn: guides/custom.md
      - Understanding the statistics: guides/statistics.md
      - Analyzing from Claude Code: guides/mcp.md
  - Examples: examples.md
  - Example notebooks:
      - Sweeps → datasets: notebooks/01_sweep_to_dataset.ipynb
      - Compare & batteries: notebooks/02_compare_and_batteries.ipynb
      - Studies: notebooks/03_study.ipynb
      - Resilient sweeps: notebooks/04_resilience.ipynb
      - LLM evaluation: notebooks/05_llm_eval.ipynb
      - scikit-learn (framework-agnostic): notebooks/06_sklearn_framework_agnostic.ipynb
      - Analyzing your results: notebooks/07_analyzing_results.ipynb
  - API Reference:
      - analysis: reference/analysis.md
      - benchmark: reference/benchmark.md
      - llm: reference/llm.md
      - study: reference/study.md
      - workflows: reference/workflows.md
      - lightning: reference/lightning.md
      - tuning: reference/tuning.md
      - utils: reference/utils.md
  - Contributing: contributing.md
  - Changelog: changelog.md
