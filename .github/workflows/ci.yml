name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[tests]"
          # TODO: drop once the pinned torch wheels ship with NumPy 2 support.
          # torch wheels for py3.9 are built against NumPy 1; avoids a binary mismatch.
          pip install "numpy<2"

      - name: Show resolved environment
        run: pip list

      - name: Run tests
        run: pytest tests/ --hypothesis-profile fast -p no:cacheprovider
