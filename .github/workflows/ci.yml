name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dev environment
        run: uv sync
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Spell check
        run: uv run codespell src tests README.md pyproject.toml

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        experimental: [false]
        include:
          # torch / Lightning may not ship 3.14 wheels yet; don't fail CI on it.
          - python-version: "3.14"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync environment (Python ${{ matrix.python-version }})
        run: uv sync --python ${{ matrix.python-version }}
      - name: Show resolved environment
        run: uv pip list
      - name: Run tests
        run: uv run pytest tests/ --hypothesis-profile fast -p no:cacheprovider
