name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync dev environment
        run: uv sync
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Spell check
        run: uv run codespell src tests examples README.md CHANGELOG.md CONTRIBUTING.md RELEASING.md pyproject.toml changes

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        experimental: [false]
        include:
          # torch / Lightning may not ship 3.14 wheels yet; don't fail CI on it.
          - python-version: "3.14"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}

    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync environment (Python ${{ matrix.python-version }})
        run: uv sync --python ${{ matrix.python-version }}
      - name: Show resolved environment
        run: uv pip list
      - name: Run tests
        run: uv run pytest tests/ --hypothesis-profile fast -p no:cacheprovider

  changelog:
    runs-on: ubuntu-latest
    # PRs only (the check diffs the base branch); never on push to main, and
    # exempt Dependabot (lockfile/deps PRs carry no user-facing fragment).
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0          # towncrier check diffs against the base branch
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync dev environment
        run: uv sync
      # `towncrier check` auto-passes when CHANGELOG.md itself is edited, so a
      # PR that hand-edits the changelog (the old workflow) would bypass the
      # fragment gate. Reject direct CHANGELOG.md edits unless the PR carries the
      # `changelog-exempt` label — used by release PRs (which rewrite it via
      # `make changelog`) and the one-time bootstrap PR that adds the marker.
      - name: Disallow direct CHANGELOG.md edits (use a changes/ fragment)
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'changelog-exempt') }}
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD -- CHANGELOG.md | grep -q .; then
            echo "::error::CHANGELOG.md is assembled from changes/ fragments at release time — don't edit it directly. Add a changes/<id>.<type>.md fragment instead (see changes/README.md). Release PRs (or the towncrier bootstrap): apply the 'changelog-exempt' label."
            exit 1
          fi
      - name: Changelog fragment check
        run: uv run towncrier check --compare-with origin/${{ github.base_ref }}

  min-versions:
    # Resolves the *lowest* declared dependency versions and runs the suite, so
    # the floors in pyproject.toml stay honest. Runs on the oldest supported
    # Python (3.9). Reproduce locally with `make test-lowest` (amd64 Docker).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync lowest-direct dependency versions (Python 3.9)
        run: uv sync --resolution lowest-direct --python 3.9
      - name: Show resolved environment
        run: uv pip list
      - name: Run tests
        run: uv run pytest tests/ --hypothesis-profile fast -p no:cacheprovider
