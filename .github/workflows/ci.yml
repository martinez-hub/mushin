name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: every job here only reads the repo (checkout, test, build
# docs). No job writes contents, issues, or PRs.
permissions:
  contents: read

# Cancel a superseded run on the same ref (e.g. when a PR branch is updated)
# instead of letting redundant matrices pile up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether the change touches code, so docs-only PRs can skip the heavy
  # test matrix. The `ci-ok` summary job (bottom) is the single required status
  # check, so jobs that are skipped here never block a merge.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      notebooks: ${{ steps.filter.outputs.notebooks }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'examples/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/**'
            notebooks:
              - 'docs/notebooks/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync dev environment
        run: uv sync
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Spell check
        run: uv run codespell src tests examples README.md CHANGELOG.md CONTRIBUTING.md RELEASING.md pyproject.toml changes

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        experimental: [false]
        include:
          # torch / Lightning may not ship 3.14 wheels yet; don't fail CI on it.
          - { os: ubuntu-latest, python-version: "3.14", experimental: true }
          - { os: windows-latest, python-version: "3.14", experimental: true }
    continue-on-error: ${{ matrix.experimental }}

    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync environment (Python ${{ matrix.python-version }})
        # --extra detection/image/audio exercise the optional batteries. Their
        # C-extension deps (pycocotools, pesq, pystoi) are win32-gated, so on
        # Windows those metrics are absent and the corresponding tests skip via
        # importorskip; SSIM/PSNR/MS-SSIM/SI-SDR core paths still run.
        run: uv sync --extra detection --extra image --extra audio --python ${{ matrix.python-version }}
      - name: Show resolved environment
        run: uv pip list
      - name: Run tests
        run: uv run --extra detection --extra image --extra audio pytest tests/ --hypothesis-profile fast -p no:cacheprovider

  batteries-clean-install:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    # Install the BUILT wheel (not the editable repo) with the battery extras into
    # a fresh environment and run the battery examples against it — catches
    # packaging / optional-extra resolution issues the editable `test` job misses.
    # Linux only (the C-extension extras pycocotools/pystoi are win32-gated).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build wheel
        run: uv build --wheel
      - name: Clean-env install (wheel + battery extras) and run the examples
        run: |
          uv venv /tmp/clean-batteries
          uv pip install --python /tmp/clean-batteries/bin/python \
            "$(ls dist/*.whl)[detection,image,audio]"
          /tmp/clean-batteries/bin/python examples/batteries.py

  notebooks:
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.notebooks == 'true'
    # Execute every docs/notebooks/*.ipynb with nbmake so the example notebooks
    # can never rot. nbmake checks that cells RUN (not output equality), so
    # numerical drift never makes this flaky; committed outputs are for display.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Register python3 kernel
        run: uv run python -m ipykernel install --user --name python3 --display-name "Python 3"
      - name: Execute example notebooks
        run: uv run --extra viz pytest --nbmake docs/notebooks/ -p no:cacheprovider

  changelog:
    runs-on: ubuntu-latest
    # PRs only (the check diffs the base branch); never on push to main, and
    # exempt Dependabot (lockfile/deps PRs carry no user-facing fragment).
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0          # towncrier check diffs against the base branch
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync dev environment
        run: uv sync
      # `towncrier check` auto-passes when CHANGELOG.md itself is edited, so a
      # PR that hand-edits the changelog (the old workflow) would bypass the
      # fragment gate. Reject direct CHANGELOG.md edits unless the PR carries the
      # `changelog-exempt` label — used by release PRs (which rewrite it via
      # `make changelog`) and the one-time bootstrap PR that adds the marker.
      - name: Disallow direct CHANGELOG.md edits (use a changes/ fragment)
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'changelog-exempt') }}
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD -- CHANGELOG.md | grep -q .; then
            echo "::error::CHANGELOG.md is assembled from changes/ fragments at release time — don't edit it directly. Add a changes/<id>.<type>.md fragment instead (see changes/README.md). Release PRs (or the towncrier bootstrap): apply the 'changelog-exempt' label."
            exit 1
          fi
      - name: Changelog fragment check
        run: uv run towncrier check --compare-with origin/${{ github.base_ref }}

  min-versions:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    # Resolves the *lowest* declared dependency versions and runs the suite, so
    # the floors in pyproject.toml stay honest. Runs on the oldest supported
    # Python (3.10). Reproduce locally with `make test-lowest` (amd64 Docker).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync lowest-direct dependency versions (Python 3.10)
        run: uv sync --resolution lowest-direct --python 3.10
      # Some deps at their floor still `import pkg_resources` at import time; uv's
      # minimal venv omits setuptools, which typical user environments include.
      # Provide it so this job tests dependency-version compatibility, not
      # setuptools presence. Pin < 81: setuptools 81 removed pkg_resources.
      - name: Provide setuptools (pkg_resources) for old floors
        run: uv pip install "setuptools<81"
      - name: Show resolved environment
        run: uv pip list
      - name: Run tests
        # --no-sync: never re-resolve here. A plain `uv run` would sync to the
        # default (highest) resolution and silently test latest deps instead of
        # the floors this job exists to validate.
        run: uv run --no-sync pytest tests/ --hypothesis-profile fast -p no:cacheprovider

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build docs (strict)
        run: uv run --group docs mkdocs build --strict

  # Single required status check. Passes when no needed job failed or was
  # cancelled — skipped jobs (e.g. the test matrix on a docs-only PR) are fine.
  # Set branch protection to require ONLY this check.
  ci-ok:
    if: always()
    needs: [changes, lint, test, batteries-clean-install, notebooks, changelog, min-versions, docs]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "A required job did not pass: ${{ join(needs.*.result, ', ') }}"
          exit 1
      - name: Success
        run: echo "All required jobs passed or were skipped."
