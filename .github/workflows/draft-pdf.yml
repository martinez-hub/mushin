name: Draft PDF

# Compiles paper/paper.md into a JOSS-formatted PDF on every change to the paper,
# so the draft can be previewed without a local TeX toolchain.
on:
  push:
    paths:
      - paper/**
      - .github/workflows/draft-pdf.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md
      - uses: actions/upload-artifact@v7
        with:
          name: paper
          path: paper/paper.pdf
