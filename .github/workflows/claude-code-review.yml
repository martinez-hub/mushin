name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # track_progress posts a summary review comment (always); classify_inline_comments
          # buffers/validates inline findings before posting them on the relevant lines.
          track_progress: true
          classify_inline_comments: true
          prompt: |
            Review this pull request for the mushin-py library — reproducible,
            statistically-rigorous ML evaluation on PyTorch Lightning and
            hydra-zen.

            Priorities, highest first:
            1. Correctness. For EVERY mushin API call in `docs/` or `examples/`,
               verify it against the real signatures in `src/` (which keyword
               arguments `compare()` and `Study()` actually accept) and flag
               invented/renamed parameters, wrong return shapes, or examples that
               would error if a user ran them — this is the project's most common
               defect.
            2. Docs/examples must be runnable and accurate: no undefined
               placeholder variables presented as runnable code; embedded
               `--8<--` snippets must match their source script.
            3. Test quality: would a test actually fail if the behavior broke?
               Flag vacuous or tautological assertions.
            4. Statistics (`src/mushin/benchmark/_stats.py`), public-API/compat
               changes, dependency-floor changes, and CI/workflow correctness.

            Post specific issues as inline comments on the relevant lines, and
            always end with a brief summary review — a one-line verdict
            (`✅ no major issues` or `⚠️ N issue(s)`) plus up to 3 bullets — even
            when the PR is clean. Cite `file:line`, suggest concrete fixes, skip
            pure style nits the formatter handles, and never add Claude/AI
            authorship anywhere.
          claude_args: '--max-turns 25'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md

