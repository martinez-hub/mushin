name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # Context: bias the review toward mushin's most common defect, then run
          # the code-review plugin (which posts inline PR comments via --comment).
          prompt: |
            This repository is the mushin-py library — reproducible,
            statistically-rigorous ML evaluation on PyTorch Lightning and
            hydra-zen. When reviewing, pay special attention to API-signature
            accuracy: for every mushin API call in `docs/` or `examples/`,
            verify it against the real signatures in `src/` (which keyword
            arguments `compare()` and `Study()` actually accept) and flag
            invented/renamed parameters or examples that would error if run —
            that is this project's most common defect. Also watch for undefined
            placeholders shown as runnable code, vacuous tests, and statistics
            (`src/mushin/benchmark/_stats.py`) or dependency-floor mistakes.
            Never add Claude/AI authorship anywhere.

            Then run the review and post inline comments on the PR:
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} high --comment
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md

