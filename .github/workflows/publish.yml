name: Publish to PyPI

# Publishes when a GitHub Release is published (tag like v0.4.0).
# Uses PyPI Trusted Publishing (OIDC) — no API tokens needed.
# One-time setup on PyPI is required; see RELEASING.md.
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(uv version --short)
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Release tag ($TAG) does not match pyproject version ($PKG)"
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # add protection rules to this env on GitHub
    permissions:
      id-token: write          # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
