name: Publish to PyPI

# Publishes when a GitHub Release is published (tag like v0.4.0).
# Uses PyPI Trusted Publishing (OIDC) — no API tokens needed.
# One-time setup on PyPI is required; see RELEASING.md.
on:
  release:
    types: [published]

# Default to read-only; the `publish` job elevates to id-token: write for
# Trusted Publishing (see its own permissions block below).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(uv version --short)
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Release tag ($TAG) does not match pyproject version ($PKG)"
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - name: Smoke-test the built wheel
        # A broken/unimportable wheel must never reach PyPI: install it into a
        # clean venv and import the package before the publish job runs.
        run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/*.whl
          /tmp/smoke/bin/python -c "import mushin; print('wheel imports ok:', mushin.__name__)"

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # add protection rules to this env on GitHub
    permissions:
      id-token: write          # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        # Pinned to a full commit SHA (v1.14.1): this step holds the OIDC
        # id-token, and a mutable tag/branch ref would let a retagged action
        # exfiltrate it or publish tampered artifacts.
        uses: pypa/gh-action-pypi-publish@2834a314042ef964da07689278dd1e9d773e8afd # v1.14.1
